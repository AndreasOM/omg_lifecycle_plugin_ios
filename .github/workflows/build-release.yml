name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.0.0)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

env:
  GODOT_TAG: 4.7.1-stable
  PLUGIN_VERSION_FLAG: "4.7"

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        run: echo "version=${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install scons

      # The committed symlink godot -> ../godot resolves to this clone.
      - name: Fetch Godot source
        run: git clone --depth 1 --branch "$GODOT_TAG" https://github.com/godotengine/godot.git ../godot

      # Full engine build is not needed, only the generated files the plugin's
      # includes pull in (list derived from the compiler's .d dependency output;
      # extend it if plugin includes grow). Naming them as scons targets builds
      # exactly those nodes and exits.
      - name: Generate engine headers
        run: |
          cd ../godot
          scons platform=ios target=template_debug arch=arm64 \
            core/version_generated.gen.h \
            core/extension/gdextension_interface.gen.h \
            core/disabled_classes.gen.h

      - name: Build xcframeworks
        run: |
          mkdir -p bin
          ./scripts/generate_xcframework.sh plugin debug   "$PLUGIN_VERSION_FLAG"
          ./scripts/generate_xcframework.sh plugin release "$PLUGIN_VERSION_FLAG"

      # Zip layout is drop-in for a Godot project: unzip into godot/ios/plugins/
      - name: Package
        run: |
          mkdir -p dist/omg_lifecycle_plugin_ios
          cp -R bin/plugin.debug.xcframework bin/plugin.release.xcframework omg_lifecycle_plugin_ios.gdip dist/omg_lifecycle_plugin_ios/
          cd dist
          zip -r "omg_lifecycle_plugin_ios-${{ steps.ver.outputs.version }}-godot-4.7.zip" omg_lifecycle_plugin_ios

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: dist/omg_lifecycle_plugin_ios-*.zip
          generate_release_notes: true
